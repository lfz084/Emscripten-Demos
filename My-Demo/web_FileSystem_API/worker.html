<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>template_html</title>
  <style>
    #log {
      width: 956px;
      height: 1280px;
      border: 3px black solid;
      font-size: 38px;
      overflow-x: hidden;
      overflow-y: auto;
      word-wrap: break-word;
    }
    #cmd {
      width: 956px;
      height: 60px;
      border: 1px black solid;
      font-size: 38px;
    }
    button {
      width: 318px;
      height: 60px;
      font-size: 50px;
    }
  </style>
</head>

<body>
  <div id="log">
    <pre>

    </pre>
  </div>
  <br><br>
  <button id="button1">button1</button>
  <button id="button2">button2</button>
  <button id="button3">button3</button>
  <button id="button4">button4</button>
  <button id="button5">button5</button>

  <script>
    const logDiv = document.getElementById("log");
    const btn01 = document.getElementById("button1");
    const btn02 = document.getElementById("button2");
    const btn03 = document.getElementById("button3");
    const btn04 = document.getElementById("button4");
    const btn05 = document.getElementById("button5");

    console.log = (...args) => log("black", args);
    console.error = (...args) => log("red", args);
    console.warn = (...args) => log("orange", args);
    console.info = (...args) => log("blue", args);

    function log(color = "black", ...args) {
      logDiv.innerHTML += `<div style="color:${color}">${args}</div>`;
      logDiv.scrollTo({
        top: logDiv.scrollHeight,
        left: 0,
        behavior: "smooth",
      });
    }
    
    document.body.onload = async function() {
          btn01.innerText = "open";
          btn02.innerText = "close";
          btn03.innerText = "read";
          btn04.innerText = "write";
          
          const root = await navigator.storage.getDirectory();
          const fileHandle = await root.getFileHandle("lcFile", {create: true});
          
          btn01.onclick = async () => {
            await msg_exports.open(fileHandle, 3).catch(e=>console.error(e.stack));
            console.log("open: " + fileHandle.name)
          }
        
          btn02.onclick = async () => {
            await msg_exports.flush();
            await msg_exports.close();
            console.log("close")
          }
        
          btn03.onclick = async () => {
            msg_exports.read.progressFunction = function(...args) {
              const buffer = args[0].buffer || args[0];
              const byteOffset = args[0].byteOffset || 0;
              const byteLength = args[0].byteLength;
              console.log(new Uint8Array(buffer, byteOffset, byteOffset + byteLength))
            }
            console.log("read:")
            const bytes = await msg_exports.read(new ArrayBuffer(10));
            console.log("bytes: " + bytes)
          }
          
          btn04.onclick = async () => {
            const u8 = new Uint8Array([1,2,3,4,5,6,7,8,9,0]);
            console.log("write")
            const bytes = await msg_exports.write(new DataView(u8.buffer, 0, 8));
            console.log("bytes: " + bytes)
          }
        }

  </script>
  <script src="./LocalFile-worker.js">
    worker
  </script>
</body>

</html>
