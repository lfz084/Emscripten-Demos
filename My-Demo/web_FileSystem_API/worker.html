<body>
    <div id = "log"><pre></pre></div>
    <div id = "cmdArea">
      <input type = "text" id = "cmd"/>

      </select>
    </div>
    <div class = "container">
      <button id = "01"></button>

      <button id = "04"></button>

      <button id = "08"></button>
    </div>
    <script>
      addEventListener("error", (e)=>console.error(e.stack || e.message || e.toString()));
    </script>
    <script>
      const logDiv = document.getElementById("log");
      const logLineQueue = [];
      const MAX_LINE = 1024;
      
      console.log = (...args) => log("black", args);
      console.error = (...args) => log("red", args);
      console.warn = (...args) => log("orange", args);
      console.info = (...args) => log("blue", args);
        
      function log(color = "black", ...args) {
        if (logLineQueue.length >= MAX_LINE) {
          logLineQueue.shift().remove();
        }
        const lineElement = document.createElement("div");
        lineElement.style.color = `${color}`;
        lineElement.innerHTML = `${args}`;
        logDiv.appendChild(lineElement);
        logLineQueue.push(lineElement);
        logDiv.scrollTo({
          top: logDiv.scrollHeight,
          left: 0,
          behavior: "smooth",
        });
      }
      
      function clear() {
        while(logLineQueue.length) {
          logLineQueue.shift().remove();
        }
      }
      
      function catchError(callback) {
        return (...args) => {
          function error(e) { console.error(e.stack || e.message || e.toString()) }
          try { 
            if (callback.constructor.name === "Function")
              return callback(...args)
            else if(callback.constructor.name === "AsyncFunction")
              return callback(...args).catch(error)
          }
          catch (e) { error(e) }
        }
      }
      
      const btnClear = document.getElementById("08");
      btnClear.innerHTML = "Clear";
      btnClear.onclick = function() {
        clear();
      }
    </script>
    <script>
      const COMMANDS = {clear: () => clear()};
      const cmdTextBox = document.getElementById("cmd");
      const selectElem = document.getElementById("select");
      let hideSelect_Timer;
      
      let perText = "";
      cmdTextBox.addEventListener("input", e => {
        const value = e.target.value;
        cmdHistory.current = value;
        perText.length < value.length && searchCommand();
        perText = value;
      });
      
      cmdTextBox.addEventListener("keydown", e => {
        const keyCode = e.keyCode;
        const [keyTab, keyEnter, keyLeft, keyUp, keyRight, keyDown] = [9, 13, 37, 38, 39, 40];
        if (keyCode === keyTab) {
          e.preventDefault();
          selectEnd();
        }
        if (keyCode === keyUp) {
          cmdTextBox.value = cmdHistory.previous() || cmdHistory.current;
          e.preventDefault();
          selectEnd();
        }
        if (keyCode === keyDown) {
          cmdTextBox.value = cmdHistory.next() || cmdHistory.current;
          e.preventDefault();
          selectEnd();
        }
        if (keyCode === keyEnter) {
          cmdHistory.current = cmdTextBox.value;
          cmdTextBox.value = "";
          enterCommand(cmdHistory.current);
        }
      });
      
      cmdTextBox.addEventListener("focusin", e => {
        showSelect();
      })
      
      cmdTextBox.addEventListener("focusout", e => {
        hideSelect_Timer = setTimeout(hideSelect, 180);
      })
      
      selectElem.addEventListener("focusin", e => {
        clearTimeout(hideSelect_Timer);
        selectElem.value = "";
      })
      
      selectElem.addEventListener("change", (e) => {
        cmdHistory.current = cmdTextBox.value = selectElem.value;
        selectEnd();
      })
      
      function enterCommand(strCmd) {
        cmdHistory.add();
        const args = strCmd.split(/\s+/);
        const cmd = args.shift();
        if (typeof COMMANDS[cmd] === "function") {
          console.log(strCmd);
          COMMANDS[cmd](...args);
        }
        else
          console.log(cmd + ": command not found");
      }
      
      function showSelect() {
        selectElem.style.display = "block";
      }
      
      function hideSelect() {
        selectElem.style.display = "none";
        selectElem.selectedIndex = 0;
      }
      
      function selectEnd() {
        cmdTextBox.focus(); 
        const len = cmdTextBox.value.length;
        cmdTextBox.setSelectionRange(len, len + 1)
      }
      
      function searchCommand() {
        const value = cmdTextBox.value.toString();
        const keys = Object.keys(COMMANDS);
        const cmds = [];
        for (let i = 0; i < keys.length; i++) {
          const cmd = keys[i];
          if (cmd !== value && new RegExp("\^" + value, "i").test(cmd)) {
            cmds.push({cmd, index: i})
          }
        }
        cmds.sort((a,b) => a.cmd.length - b.cmd.length)
        if (cmds[0]) {
            const cmd = cmds[0].cmd, index = cmds[0].index;
            const st = value.length, ed = cmd.length;
            cmdTextBox.value = cmd;
            cmdTextBox.setSelectionRange(st, ed);
            selectElem.selectedIndex = index;
        }
      }
      
      const cmdHistory = {
        MAX_LEN: 0xFF,
        _index: [0],
        queue: [""],
        add: function() {
          this.queue.length = this.index + 2;
          this.queue[this.index + 1] = "";
          this.queue.length > this.MAX_LEN ? this.queue.shift() : ++this.index;
        },
        previous: function() {
          if (this.index <= 0) return;
          --this.index;
          return this.current;
        },
        next: function() {
          if (this.index >= this.queue.length - 1) return;
          ++this.index;
          return this.current;
        },
        get index() {
          return this._index[0];
        },
        set index(i) {
          i = parseInt(i);
          (i >= 0) && (i <= this.queue.length - 1) && (this._index[0] = i);
        },
        get current() {
          return this.queue[this.index];
        },
        set current(cmdStr) {
          this.queue[this.index] = cmdStr.replace(/\n/g,"");
        }
      };
      Object.freeze(cmdHistory);
    </script>

            return msg_exports.testWriteRead(path);

        }
        
        const has_buttons = typeof buttons === "object";
        const has_commands = typeof commands === "object";
        
        has_buttons && buttons.map(button => {
          const btn = document.getElementById(button["id"]);
          Object.keys(button).map(k => btn[k] = typeof button[k] === "function" ? catchError(button[k]) : button[k]);
        })
      
        has_commands && Object.keys(commands).map(cmd => COMMANDS[cmd] = catchError(commands[cmd]));
        
        Object.keys(COMMANDS).map(key => { 
		      if (typeof COMMANDS[key] !== "function") return;
		      const op = document.createElement("option");
		      op.value = key;
		      op.innerText = key + "(" + (has_commands && commands[key] || COMMANDS[key]).toString().match(/(?<=\()[\w\s\"\'\`\=\,]*(?=\))|(?<=\s*)\w+(?=\s*\=\>)/)[0].replace(/\s*\,\s*/g, ",") + ")";
		      selectElem.appendChild(op);
        })
    </script>

      worker
